<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 1: Finding & Identifying Errors - Uttoron</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-ink: #1a1a1a;
            --color-paper: #faf8f3;
            --color-teal: #2d8a8a;
            --color-stamp: #d4a574;
            --color-error: #c84e4e;
            --color-success: #5a8a5a;
            --color-warning: #d4a574;
            --color-border: #d4c5b9;
            --color-bg-light: #f5f2ed;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-paper); color: var(--color-ink); line-height: 1.6; padding: var(--spacing-lg); }
        .container { max-width: 900px; margin: 0 auto; }

        /* ============================================================
           NAVIGATION BAR - Added for Uttoron site integration
           ============================================================ */
        .top-nav {
            background: #1a1a1a;
            color: white;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .top-nav .brand {
            font-weight: 700;
            font-size: 1.1rem;
            font-family: 'Fraunces', serif;
        }
        .top-nav .brand span {
            color: #d4a574;
        }
        .top-nav a {
            color: #d4a574;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .top-nav a:hover {
            color: #e8c99e;
            text-decoration: underline;
        }
        .top-nav .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .top-nav .nav-links .separator {
            color: #555;
            margin: 0 4px;
        }
        .top-nav .nav-links .current {
            color: #999;
            font-size: 0.9rem;
        }
        @media (max-width: 600px) {
            .top-nav {
                flex-direction: column;
                align-items: flex-start;
            }
            .top-nav .nav-links {
                flex-wrap: wrap;
            }
        }

        header { margin-bottom: var(--spacing-xl); border-bottom: 2px solid var(--color-border); padding-bottom: var(--spacing-lg); }
        h1 { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 700; color: var(--color-ink); margin-bottom: var(--spacing-sm); }
        .subtitle { font-size: 1.1rem; color: #666; font-style: italic; }
        .lesson-nav { display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl); flex-wrap: wrap; }
        .module-btn { padding: var(--spacing-sm) var(--spacing-md); border: 2px solid var(--color-border); background-color: var(--color-paper); color: var(--color-ink); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 500; border-radius: 4px; transition: all 0.3s ease; }
        .module-btn:hover { background-color: var(--color-bg-light); border-color: var(--color-teal); }
        .module-btn.active { background-color: var(--color-teal); color: var(--color-paper); border-color: var(--color-teal); }
        .module { display: none; animation: fadeIn 0.3s ease; }
        .module.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 600; color: var(--color-ink); margin-bottom: var(--spacing-md); }
        h3 { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 600; color: var(--color-ink); margin-top: var(--spacing-md); margin-bottom: var(--spacing-sm); }
        p { margin-bottom: var(--spacing-md); line-height: 1.7; }
        .instruction { background-color: var(--color-bg-light); padding: var(--spacing-md); border-left: 4px solid var(--color-teal); margin-bottom: var(--spacing-lg); border-radius: 4px; }
        .record-card { background-color: var(--color-paper); border: 1px solid var(--color-border); padding: var(--spacing-md); margin-bottom: var(--spacing-md); border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; }
        .record-field { display: flex; justify-content: space-between; padding: var(--spacing-sm) 0; border-bottom: 1px solid var(--color-border); }
        .record-field:last-child { border-bottom: none; }
        .field-label { font-weight: 600; color: var(--color-teal); min-width: 150px; }
        .field-value { flex: 1; text-align: right; word-break: break-word; }
        .field-value.error { color: var(--color-error); font-weight: 600; }
        .clickable-field { cursor: pointer; padding: 2px 5px; border-radius: 3px; transition: all 0.2s ease; }
        .clickable-field:hover { background-color: #fff3cd; }
        .clickable-field.selected { background-color: #d4edda; border: 1px solid var(--color-success); }
        .clickable-field.incorrect { background-color: #f8d7da; border: 1px solid var(--color-error); }
        .button-group { display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-md); flex-wrap: wrap; }
        button { padding: var(--spacing-sm) var(--spacing-md); background-color: var(--color-teal); color: var(--color-paper); border: none; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        button:hover { background-color: #1f6666; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        button.secondary { background-color: var(--color-paper); color: var(--color-ink); border: 2px solid var(--color-border); }
        .feedback { padding: var(--spacing-md); border-radius: 4px; margin-top: var(--spacing-md); display: none; }
        .feedback.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .feedback.success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .feedback.error { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .timer { font-family: 'IBM Plex Mono', monospace; font-size: 1.5rem; font-weight: 600; color: var(--color-teal); margin-bottom: var(--spacing-md); }
        .records-list { display: grid; gap: var(--spacing-md); margin-bottom: var(--spacing-lg); }
        .record-item { border: 1px solid var(--color-border); padding: var(--spacing-md); border-radius: 4px; background-color: var(--color-paper); transition: all 0.3s ease; }
        .record-item.flagged { border-left: 4px solid var(--color-error); background-color: #fff5f5; }
        .priority-list { display: flex; flex-direction: column; gap: var(--spacing-sm); margin-bottom: var(--spacing-lg); }
        .priority-item { background-color: var(--color-bg-light); padding: var(--spacing-md); border: 2px solid var(--color-border); border-radius: 4px; cursor: grab; display: flex; justify-content: space-between; align-items: center; }
        .priority-item:hover { border-color: var(--color-teal); background-color: #e8f4f4; }
        .priority-rank { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 600; color: var(--color-teal); min-width: 40px; }
        .priority-severity { padding: var(--spacing-xs) var(--spacing-sm); background-color: var(--color-warning); color: var(--color-paper); border-radius: 3px; font-size: 0.8rem; font-weight: 600; }
        .state-machine { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: var(--spacing-sm); margin-top: var(--spacing-md); }
        .state-btn { padding: var(--spacing-xs); border: 1px solid var(--color-border); background-color: var(--color-paper); border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .state-btn.active { background-color: var(--color-teal); color: var(--color-paper); border-color: var(--color-teal); }
        .footer { margin-top: var(--spacing-xl); padding-top: var(--spacing-lg); border-top: 2px solid var(--color-border); text-align: center; color: #999; font-size: 0.9rem; }
        .error-type-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--spacing-md); margin-bottom: var(--spacing-lg); }
        .error-type-card { border: 2px solid var(--color-border); padding: var(--spacing-md); border-radius: 4px; cursor: pointer; }
        .error-type-card.active { border-color: var(--color-teal); background-color: #e8f4f4; }
    </style>
</head>
<body>
    <div class="container">

        <!-- ============================================================
             NAVIGATION BAR - Added for Uttoron site integration
             ============================================================ -->
        <nav class="top-nav">
            <div class="brand">🕌 <span>Uttoron</span></div>
            <div class="nav-links">
                <a href="../../webapp/index1.html">🏠 Home</a>
                <span class="separator">|</span>
                <a href="../../webapp/data-accuracy.html">🧹 Data Accuracy</a>
                <span class="separator">|</span>
                <span class="current">📖 Lesson 1: Find Errors</span>
            </div>
        </nav>

        <header>
            <h1 id="lessonTitle">Lesson 1: Finding & Identifying Errors</h1>
            <p class="subtitle" id="lessonSubtitle">Learn to spot and categorize data quality issues in real records</p>
        </header>

        <div class="lesson-nav" id="lessonNav">
            <button class="module-btn active" data-module="1">1. Why Accuracy Matters</button>
            <button class="module-btn" data-module="2">2. Types of Errors</button>
            <button class="module-btn" data-module="3">3. Spot the Error</button>
            <button class="module-btn" data-module="4">4. Error Hunt Challenge</button>
            <button class="module-btn" data-module="5">5. Prioritizing Errors</button>
            <button class="module-btn" data-module="6">6. Workplace Simulation</button>
        </div>

        <div id="moduleContent"></div>

        <div class="footer">
            <p>Uttoron — Vocational Digital Skills for Underprivileged Youth in Bangladesh</p>
            <p>Track 3: Data Accuracy & Quality Assurance</p>
        </div>
    </div>

    <script type="module">
        import { errorInjectionEngine, sampleRecords } from './data/errorInjection/errorInjectionEngine.js';
        import { Lesson1 } from './lessons/lesson1/Lesson1.js';

        const lesson = new Lesson1(errorInjectionEngine, sampleRecords);
        const moduleContent = document.getElementById('moduleContent');

        function renderModule(moduleNumber) {
            const module = lesson.getModuleByNumber(moduleNumber);
            const content = module.getContent ? module.getContent() : null;
            
            // Clear previous content
            moduleContent.innerHTML = '';
            
            const moduleDiv = document.createElement('div');
            moduleDiv.className = 'module active';

            if (moduleNumber === 1) {
                moduleDiv.innerHTML = `
                    <h2>${content.title}</h2>
                    <div class="instruction"><strong>Scenario:</strong> ${content.scenario.description}</div>
                    <div class="record-card">
                        <div class="record-field"><span class="field-label">Item Name:</span><span class="field-value">${content.scenario.record.itemName}</span></div>
                        <div class="record-field"><span class="field-label">SKU:</span><span class="field-value">${content.scenario.record.sku}</span></div>
                        <div class="record-field"><span class="field-label">Recorded Qty:</span><span class="field-value error">${content.scenario.record.recordedQuantity}</span></div>
                        <div class="record-field"><span class="field-label">Actual Qty:</span><span class="field-value">${content.scenario.record.actualQuantity}</span></div>
                    </div>
                    <h3>What Went Wrong?</h3>
                    <ul style="margin-left: 20px; margin-bottom: 20px;">
                        ${content.consequences.map(c => `<li><strong>${c.title}:</strong> ${c.description}</li>`).join('')}
                    </ul>
                    <p>${content.learningObjective}</p>
                    <div class="button-group"><button id="nextBtn">Next: Types of Errors →</button></div>
                `;
                moduleContent.appendChild(moduleDiv);
                document.getElementById('nextBtn').onclick = () => switchModule(2);
            } else if (moduleNumber === 2) {
                const types = module.getErrorTypes();
                moduleDiv.innerHTML = `
                    <h2>${module.title}</h2>
                    <div class="instruction">Explore each error type below. Click on a category to see a real example.</div>
                    <div class="error-type-grid">
                        ${types.map(t => `<div class="error-type-card" data-id="${t.id}"><strong>${t.name}</strong><br><small>${t.description}</small></div>`).join('')}
                    </div>
                    <div id="exampleDisplay" style="margin-top: 20px;"></div>
                    <div class="button-group"><button class="secondary" id="prevBtn">← Back</button><button id="nextBtn">Next: Spot the Error →</button></div>
                `;
                moduleContent.appendChild(moduleDiv);
                
                const cards = moduleDiv.querySelectorAll('.error-type-card');
                const display = document.getElementById('exampleDisplay');
                
                cards.forEach(card => {
                    card.onclick = () => {
                        cards.forEach(c => c.classList.remove('active'));
                        card.classList.add('active');
                        const example = module.generateExample(card.dataset.id);
                        display.innerHTML = `
                            <div class="record-card">
                                <strong>${example.errorType.name} Example:</strong><br><br>
                                <div class="record-field"><span class="field-label">Field:</span><span class="field-value">${example.example.field}</span></div>
                                <div class="record-field"><span class="field-label">Original:</span><span class="field-value">${example.example.original}</span></div>
                                <div class="record-field"><span class="field-label">Corrupted:</span><span class="field-value error">${example.example.corrupted}</span></div>
                            </div>
                        `;
                    };
                });
                
                document.getElementById('prevBtn').onclick = () => switchModule(1);
                document.getElementById('nextBtn').onclick = () => switchModule(3);
                cards[0].click();
            } else if (moduleNumber === 3) {
                const activity = module.generateActivity();
                moduleDiv.innerHTML = `
                    <h2>${module.title}</h2>
                    <div class="instruction">Click on the field(s) you believe contain errors.</div>
                    <div class="record-card" id="spotRecord">
                        ${Object.entries(activity.record).map(([k, v]) => {
                            if (k === 'lineItems') return '';
                            return `<div class="record-field"><span class="field-label">${k}:</span><span class="field-value clickable-field" data-field="${k}">${v}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="button-group"><button class="secondary" id="resetBtn">Reset</button><button id="checkBtn">Check My Work</button></div>
                    <div id="feedback" class="feedback"></div>
                    <div class="button-group" style="margin-top: 20px;"><button class="secondary" id="prevBtn">← Back</button><button id="nextBtn">Next: Challenge →</button></div>
                `;
                moduleContent.appendChild(moduleDiv);
                
                const fields = moduleDiv.querySelectorAll('.clickable-field');
                fields.forEach(f => {
                    f.onclick = () => {
                        f.classList.toggle('selected');
                        module.toggleFieldSelection(f.dataset.field);
                    };
                });
                
                document.getElementById('checkBtn').onclick = () => {
                    const result = module.checkAnswer();
                    const fb = document.getElementById('feedback');
                    fb.className = `feedback show ${result.isCorrect ? 'success' : 'error'}`;
                    fb.innerHTML = result.message;
                    if (!result.isCorrect) {
                        fields.forEach(f => {
                            if (f.dataset.field === result.diff.field) f.classList.add('incorrect');
                        });
                    }
                };
                
                document.getElementById('resetBtn').onclick = () => {
                    module.reset();
                    fields.forEach(f => f.classList.remove('selected', 'incorrect'));
                    document.getElementById('feedback').classList.remove('show');
                };
                
                document.getElementById('prevBtn').onclick = () => switchModule(2);
                document.getElementById('nextBtn').onclick = () => switchModule(4);
            } else if (moduleNumber === 4) {
                moduleDiv.innerHTML = `
                    <h2>${module.title}</h2>
                    <div class="instruction">Flag all erroneous records. Speed and accuracy matter!</div>
                    <div class="timer" id="timer">2:00</div>
                    <div id="challengeRecords" class="records-list"></div>
                    <div class="button-group"><button id="startBtn">Start Challenge</button></div>
                    <div id="feedback" class="feedback"></div>
                    <div class="button-group" style="margin-top: 20px;"><button class="secondary" id="prevBtn">← Back</button><button id="nextBtn">Next: Priority →</button></div>
                `;
                moduleContent.appendChild(moduleDiv);
                
                const startBtn = document.getElementById('startBtn');
                const timerEl = document.getElementById('timer');
                const recordsDiv = document.getElementById('challengeRecords');
                let timerInterval;

                startBtn.onclick = () => {
                    const records = module.generateChallenge();
                    module.startChallenge();
                    startBtn.disabled = true;
                    let timeLeft = 120;
                    
                    recordsDiv.innerHTML = records.map((r, i) => `
                        <div class="record-item" id="rec-${i}">
                            <strong>${r.id} (${r.domain})</strong><br>
                            <small>${Object.values(r.record).slice(1, 3).join(', ')}</small><br>
                            <button class="secondary flag-btn" style="margin-top: 10px;" data-idx="${i}">Flag</button>
                        </div>
                    `).join('');
                    
                    recordsDiv.querySelectorAll('.flag-btn').forEach(btn => {
                        btn.onclick = () => {
                            const idx = btn.dataset.idx;
                            const isFlagged = module.toggleRecordFlag(idx);
                            btn.textContent = isFlagged ? 'Unflag' : 'Flag';
                            document.getElementById(`rec-${idx}`).classList.toggle('flagged', isFlagged);
                        };
                    });

                    timerInterval = setInterval(() => {
                        timeLeft--;
                        const mins = Math.floor(timeLeft / 60);
                        const secs = timeLeft % 60;
                        timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval);
                            const stats = module.endChallenge(120);
                            const fb = document.getElementById('feedback');
                            fb.className = 'feedback show success';
                            fb.innerHTML = `<strong>Challenge Complete!</strong> Accuracy: ${stats.accuracy}%. Correct: ${stats.correctFlags}/${stats.totalErrors}.`;
                            startBtn.disabled = false;
                        }
                    }, 1000);
                };
                
                document.getElementById('prevBtn').onclick = () => switchModule(3);
                document.getElementById('nextBtn').onclick = () => switchModule(5);
            } else if (moduleNumber === 5) {
                const errors = module.generateErrorList();
                moduleDiv.innerHTML = `
                    <h2>${module.title}</h2>
                    <div class="instruction">Rank these errors by severity (1 = Most Critical).</div>
                    <div id="priorityList" class="priority-list">
                        ${errors.map((e, i) => `
                            <div class="priority-item" draggable="true" data-id="${e.id}">
                                <span class="priority-rank">#${i+1}</span>
                                <div><strong>${e.description}</strong><br><small>${e.impact}</small></div>
                                <span class="priority-severity">${e.severity}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="button-group"><button id="checkBtn">Check Order</button></div>
                    <div id="feedback" class="feedback"></div>
                    <div class="button-group" style="margin-top: 20px;"><button class="secondary" id="prevBtn">← Back</button><button id="nextBtn">Next: Simulation →</button></div>
                `;
                moduleContent.appendChild(moduleDiv);
                
                // Simple drag and drop (visual only for this demo, real reordering would update state)
                const list = document.getElementById('priorityList');
                let draggingItem = null;

                list.addEventListener('dragstart', (e) => {
                    draggingItem = e.target;
                    e.target.style.opacity = '0.5';
                });

                list.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const afterElement = getDragAfterElement(list, e.clientY);
                    if (afterElement == null) {
                        list.appendChild(draggingItem);
                    } else {
                        list.insertBefore(draggingItem, afterElement);
                    }
                });

                list.addEventListener('dragend', (e) => {
                    e.target.style.opacity = '1';
                    const items = Array.from(list.querySelectorAll('.priority-item'));
                    items.forEach((item, idx) => {
                        item.querySelector('.priority-rank').textContent = `#${idx + 1}`;
                    });
                    module.recordUserOrder(items.map(item => parseInt(item.dataset.id)));
                });

                function getDragAfterElement(container, y) {
                    const draggableElements = [...container.querySelectorAll('.priority-item:not(.dragging)')];
                    return draggableElements.reduce((closest, child) => {
                        const box = child.getBoundingClientRect();
                        const offset = y - box.top - box.height / 2;
                        if (offset < 0 && offset > closest.offset) {
                            return { offset: offset, element: child };
                        } else {
                            return closest;
                        }
                    }, { offset: Number.NEGATIVE_INFINITY }).element;
                }

                document.getElementById('checkBtn').onclick = () => {
                    const result = module.checkOrder();
                    const fb = document.getElementById('feedback');
                    fb.className = `feedback show ${result.isCorrect ? 'success' : 'error'}`;
                    fb.innerHTML = result.message;
                };

                document.getElementById('prevBtn').onclick = () => switchModule(4);
                document.getElementById('nextBtn').onclick = () => switchModule(6);
            } else if (moduleNumber === 6) {
                const batch = module.generateBatch();
                moduleDiv.innerHTML = `
                    <h2>${module.title}</h2>
                    <div class="instruction">Manage this batch through the workflow.</div>
                    <div id="simRecords" class="records-list">
                        ${batch.map((r, i) => `
                            <div class="record-item" id="sim-rec-${i}">
                                <strong>${r.id}</strong><br>
                                <div id="sim-status-${i}">Status: Pending</div>
                                <div class="state-machine" id="sim-actions-${i}"></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="button-group"><button id="submitBtn">Submit Batch</button></div>
                    <div id="feedback" class="feedback"></div>
                    <div class="button-group" style="margin-top: 20px;"><button class="secondary" id="prevBtn">← Back</button></div>
                `;
                moduleContent.appendChild(moduleDiv);

                const renderStates = (idx) => {
                    const actionsDiv = document.getElementById(`sim-actions-${idx}`);
                    const statusDiv = document.getElementById(`sim-status-${idx}`);
                    const currentState = module.getRecordState(idx);
                    const allowed = module.getAllowedTransitions(idx);
                    
                    statusDiv.textContent = `Status: ${currentState}`;
                    actionsDiv.innerHTML = allowed.map(s => `<button class="state-btn" data-state="${s}">${s}</button>`).join('');
                    
                    actionsDiv.querySelectorAll('.state-btn').forEach(btn => {
                        btn.onclick = () => {
                            module.updateRecordState(idx, btn.dataset.state);
                            renderStates(idx);
                        };
                    });
                };

                batch.forEach((_, i) => renderStates(i));

                document.getElementById('submitBtn').onclick = () => {
                    const result = module.submitBatch();
                    const fb = document.getElementById('feedback');
                    fb.className = `feedback show ${result.success ? 'success' : 'error'}`;
                    fb.innerHTML = result.message;
                    if (result.success) {
                        alert('Congratulations! Lesson 1 Complete.');
                    }
                };
                
                document.getElementById('prevBtn').onclick = () => switchModule(5);
            }
        }

        function switchModule(moduleNumber) {
            lesson.switchToModule(moduleNumber);
            document.querySelectorAll('.module-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.module) === moduleNumber);
            });
            renderModule(moduleNumber);
            window.scrollTo(0, 0);
        }

        document.querySelectorAll('.module-btn').forEach(btn => {
            btn.onclick = () => switchModule(parseInt(btn.dataset.module));
        });

        // Start at module 1
        switchModule(1);
    </script>
</body>
</html>
