<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Uttoron — Keyboard & Typing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & ROOT ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --navy: #14313B;
            --navy-deep: #0D2229;
            --paper: #F6F0DF;
            --paper-dim: #EAE1C7;
            --ink: #1C2B2E;
            --marigold: #E8A33D;
            --coral: #E2593B;
            --teal-stamp: #2E7D5B;
            --line: rgba(246, 240, 223, 0.16);
            --shadow: rgba(13, 34, 41, 0.35);
            --radius: 16px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            --finger-lpinky: #FF6B6B;
            --finger-lring: #FF9F43;
            --finger-lmiddle: #FECA57;
            --finger-lindex: #54A0FF;
            --finger-rindex: #A29BFE;
            --finger-rmiddle: #1DD1A1;
            --finger-rring: #10AC84;
            --finger-rpinky: #FF9FF3;
            --finger-thumb: #b0a8a0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            margin: 0;
            background: var(--navy);
            color: var(--paper);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        body.lite {
            --navy: #1a2f36;
            --navy-deep: #0f2127;
            --paper: #f2ecdd;
            --marigold: #d4952f;
            --coral: #d14f33;
            --shadow: rgba(0, 0, 0, 0.25);
        }
        body.lite * {
            animation: none !important;
            transition: none !important;
            box-shadow: none !important;
        }
        h1,
        h2,
        h3,
        h4,
        .display {
            font-family: var(--font-display);
            letter-spacing: -0.01em;
        }
        .mono {
            font-family: var(--font-mono);
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        button {
            font-family: var(--font-body);
            cursor: pointer;
            border: none;
            background: none;
        }
        input,
        select,
        textarea {
            font-family: var(--font-body);
            font-size: 1rem;
        }
        :focus-visible {
            outline: 3px solid var(--marigold);
            outline-offset: 2px;
        }
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--navy-deep);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .nav-inner {
            max-width: 1040px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.01em;
        }
        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--marigold);
            color: var(--navy-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.8rem;
            border: 2px solid var(--paper);
            flex-shrink: 0;
        }
        .back-link {
            color: var(--paper-dim);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-link:hover {
            color: var(--marigold);
            text-decoration: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.92rem;
            transition: transform 0.15s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--coral);
            color: var(--paper);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(226, 89, 58, 0.35);
        }
        .btn-secondary {
            background: transparent;
            color: var(--paper);
            border: 1.5px solid var(--paper-dim);
        }
        .btn-secondary:hover {
            border-color: var(--marigold);
            color: var(--marigold);
        }
        .btn-success {
            background: var(--teal-stamp);
            color: var(--paper);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 125, 91, 0.35);
        }
        .btn-sm {
            padding: 7px 16px;
            font-size: 0.8rem;
        }

        section {
            padding: 32px 0;
        }
        .lesson-shell {
            background: var(--paper);
            color: var(--ink);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 50px var(--shadow);
        }
        .lesson-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }
        .lesson-top .tag {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--teal-stamp);
        }
        .lesson-top h2 {
            margin: 4px 0 0;
            font-size: 1.3rem;
        }
        .close-x {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #8a806c;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .close-x:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        .lesson-progress {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e3d9b8;
            transition: background 0.3s;
        }
        .dot.active {
            background: var(--teal-stamp);
        }
        .dot.done {
            background: var(--teal-stamp);
            opacity: 0.5;
        }

        .scenario-card {
            background: #fff;
            border: 1.5px solid #e3d9b8;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* ===== TYPING LESSON STYLES ===== */
        .typing-target {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            line-height: 1.8;
            padding: 12px 16px;
            background: #faf8f2;
            border-radius: 8px;
            border: 1.5px solid #e3d9b8;
            margin-bottom: 12px;
            letter-spacing: 1px;
            word-break: break-all;
        }
        .typing-target .char {
            transition: background 0.1s;
            padding: 2px 1px;
            border-radius: 2px;
        }
        .typing-target .char.correct {
            background: #b8e0c2;
            color: #1a4d2e;
        }
        .typing-target .char.wrong {
            background: #f8d0c4;
            color: #a1321a;
        }
        .typing-target .char.current {
            background: #ffeaa7;
            color: #1a1a1a;
            box-shadow: 0 0 0 2px var(--marigold);
        }
        .typing-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1.5px solid #d8cfae;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            background: #fff;
            letter-spacing: 1px;
        }
        .typing-input:focus {
            outline: none;
            border-color: var(--teal-stamp);
        }
        .typing-status {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #5b6b63;
            min-height: 1.5em;
        }
        .typing-status.good {
            color: var(--teal-stamp);
            font-weight: 600;
        }

        /* ===== FINGER PLACEMENT ===== */
        .finger-placement-area {
            background: #f0ebe0;
            border-radius: 14px;
            padding: 16px 12px 12px;
            margin-bottom: 14px;
            border: 1px solid #d8cfae;
        }
        .finger-placement-area .fp-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #5b6b63;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .hand-wrapper {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-start;
        }
        .hand-svg-wrap {
            flex: 0 0 auto;
            max-width: 260px;
            width: 100%;
        }
        .hand-svg-wrap svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .finger-label {
            font-size: 0.55rem;
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: central;
            fill: #1a1a1a;
            opacity: 0.8;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .finger-label.active {
            opacity: 1;
            fill: #000;
            font-weight: 800;
            font-size: 0.6rem;
        }
        .finger-shape {
            transition: all 0.25s ease;
            stroke-width: 2;
            stroke: #b5aa8a;
            fill: #e8e2d3;
            cursor: default;
        }
        .finger-shape.active {
            stroke-width: 3.5;
            stroke: #1a1a1a;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.2));
        }
        .finger-shape.lpinky {
            fill: var(--finger-lpinky);
        }
        .finger-shape.lring {
            fill: var(--finger-lring);
        }
        .finger-shape.lmiddle {
            fill: var(--finger-lmiddle);
        }
        .finger-shape.lindex {
            fill: var(--finger-lindex);
        }
        .finger-shape.rindex {
            fill: var(--finger-rindex);
        }
        .finger-shape.rmiddle {
            fill: var(--finger-rmiddle);
        }
        .finger-shape.rring {
            fill: var(--finger-rring);
        }
        .finger-shape.rpinky {
            fill: var(--finger-rpinky);
        }
        .finger-shape.thumb {
            fill: var(--finger-thumb);
        }
        .hand-label {
            font-size: 0.6rem;
            font-weight: 600;
            fill: #3d3d3d;
            text-anchor: middle;
            dominant-baseline: central;
            opacity: 0.7;
        }
        .finger-name-display {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1a1a1a;
            padding: 6px 12px;
            background: #fff;
            border-radius: 20px;
            display: inline-block;
            border: 1.5px solid #cbbf95;
            margin: 4px auto 0;
            min-width: 100px;
        }
        .finger-name-display .finger-color-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        /* ===== VIRTUAL KEYBOARD ===== */
        .keyboard {
            background: #e8e2d3;
            border-radius: 12px;
            padding: 10px 8px 8px;
            margin-top: 14px;
            border: 1px solid #cbbf95;
            user-select: none;
            max-width: 100%;
            overflow-x: auto;
        }
        .key-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 4px;
        }
        .key {
            min-width: 32px;
            height: 36px;
            border-radius: 4px;
            background: #fcf8f0;
            border: 1px solid #b5aa8a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a1a1a;
            transition: all 0.15s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
            position: relative;
            cursor: default;
        }
        .key.special {
            min-width: 44px;
            font-size: 0.65rem;
            background: #dcd4c0;
        }
        .key.space {
            min-width: 120px;
            background: #dcd4c0;
        }
        .key.lpinky {
            background: var(--finger-lpinky);
        }
        .key.lring {
            background: var(--finger-lring);
        }
        .key.lmiddle {
            background: var(--finger-lmiddle);
        }
        .key.lindex {
            background: var(--finger-lindex);
        }
        .key.rindex {
            background: var(--finger-rindex);
            color: #fff;
        }
        .key.rmiddle {
            background: var(--finger-rmiddle);
        }
        .key.rring {
            background: var(--finger-rring);
            color: #fff;
        }
        .key.rpinky {
            background: var(--finger-rpinky);
        }
        .key.thumb {
            background: var(--finger-thumb);
        }
        .key.highlight {
            border: 3px solid var(--marigold);
            box-shadow: 0 0 16px rgba(232, 163, 61, 0.7);
            transform: scale(1.08);
            z-index: 2;
            position: relative;
        }
        .key.highlight::after {
            content: "👆";
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.2));
            animation: bounce-finger 0.8s ease-in-out infinite alternate;
        }
        @keyframes bounce-finger {
            0% {
                transform: translateX(-50%) translateY(0);
            }
            100% {
                transform: translateX(-50%) translateY(-4px);
            }
        }
        body.lite .key.highlight::after {
            animation: none;
        }
        .key .key-finger-tip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #fff;
            font-size: 0.55rem;
            font-family: var(--font-body);
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .key:hover .key-finger-tip {
            opacity: 1;
        }
        .keyboard-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 14px;
            justify-content: center;
            margin-top: 6px;
            font-size: 0.65rem;
            color: #3d3d3d;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: default;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid #8a806c;
        }

        .lesson-complete {
            text-align: center;
            padding: 16px 0;
        }
        .big-stamp {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 3px solid var(--teal-stamp);
            color: var(--teal-stamp);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.75rem;
            flex-direction: column;
            transform: rotate(-6deg);
            background: rgba(46, 125, 91, 0.06);
        }
        .big-stamp .stamp-icon {
            font-size: 1.6rem;
        }

        footer {
            padding: 32px 0 44px;
            border-top: 1px solid var(--line);
            color: var(--paper-dim);
            font-size: 0.78rem;
        }
        footer .wrap {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--navy-deep);
            color: var(--paper);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            border: 1px solid var(--line);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .toast.success {
            border-color: var(--teal-stamp);
        }
        .toast.error {
            border-color: var(--coral);
        }

        @media (max-width: 500px) {
            .key {
                min-width: 24px;
                height: 28px;
                font-size: 0.6rem;
            }
            .key.special {
                min-width: 32px;
                font-size: 0.55rem;
            }
            .key.space {
                min-width: 60px;
            }
            .keyboard {
                padding: 6px 4px;
            }
            .key-row {
                gap: 2px;
                margin-bottom: 2px;
            }
            .hand-svg-wrap {
                max-width: 180px;
            }
            .finger-name-display {
                font-size: 0.7rem;
                min-width: 70px;
                padding: 4px 10px;
            }
            .typing-target {
                font-size: 1rem;
            }
            .key.highlight::after {
                font-size: 0.5rem;
                top: -14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-inner">
            <div class="brand">
                <span class="brand-mark">উ</span>
                Uttoron
            </div>
            <a href="index1.html" class="back-link">← Back to Home</a>
        </div>
    </nav>

    <!-- ===== LESSON ===== -->
    <section>
        <div class="wrap">
            <div class="lesson-shell" id="lessonShell"></div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <div class="wrap">
            <span>Uttoron — Skills Passport</span>
            <span>Keyboard & Typing · Interactive Lesson</span>
        </div>
    </footer>

    <script>
        (function() {
            "use strict";

            // ============================================================
            //  TYPING LESSON DATA
            // ============================================================
            const LESSON_DATA = {
                'typing': {
                    title: 'Keyboard & Typing',
                    tag: 'Typing Fundamentals',
                    type: 'typing',
                    phrases: [
                        "The quick brown fox jumps over the lazy dog.",
                        "Practice makes perfect.",
                        "Type accurately, not just fast.",
                        "Good typing skills are essential for office work."
                    ]
                }
            };

            // ============================================================
            //  STORAGE HELPERS (for progress saving)
            // ============================================================
            function getStorage(key) {
                try {
                    const raw = localStorage.getItem(key);
                    if (raw === null) return null;
                    return JSON.parse(raw);
                } catch (e) {
                    return null;
                }
            }

            function setStorage(key, val) {
                try {
                    localStorage.setItem(key, JSON.stringify(val));
                    return true;
                } catch (e) {
                    return false;
                }
            }

            // ============================================================
            //  SAVE PROGRESS
            // ============================================================
            function saveProgress() {
                // Get current session
                const session = getStorage('uttoron:session');
                if (!session || !session.num) {
                    showToast('Please sign in to save your progress!', '');
                    return false;
                }

                // Get existing progress or create new
                const progressKey = 'progress:' + session.num;
                let progress = getStorage(progressKey) || {};

                // Mark typing as complete
                progress.typing = true;

                // Save back to localStorage
                if (setStorage(progressKey, progress)) {
                    showToast('✅ Stamp saved to your Passport!', 'success');
                    return true;
                } else {
                    showToast('Failed to save progress. Please try again.', 'error');
                    return false;
                }
            }

            // ============================================================
            //  STATE
            // ============================================================
            let currentLessonId = 'typing';
            let currentItemIndex = 0;
            let lessonCompleted = false;

            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => Array.from(document.querySelectorAll(sel));

            // ============================================================
            //  TOAST
            // ============================================================
            let toastTimer = null;

            function showToast(msg, type = '') {
                const el = $('#toast');
                el.textContent = msg;
                el.className = 'toast show ' + type;
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => { el.className = 'toast'; }, 3500);
            }

            // ============================================================
            //  FINGER PLACEMENT — Hand Diagram
            // ============================================================
            function buildHandSVG(activeFinger) {
                const fingerNames = {
                    'lpinky': 'Pinky',
                    'lring': 'Ring',
                    'lmiddle': 'Middle',
                    'lindex': 'Index',
                    'rindex': 'Index',
                    'rmiddle': 'Middle',
                    'rring': 'Ring',
                    'rpinky': 'Pinky',
                    'thumb': 'Thumb'
                };
                const leftFingers = [
                    { id: 'lpinky', label: 'Pinky', x: 20, y: 60, w: 16, h: 38, rx: 6 },
                    { id: 'lring', label: 'Ring', x: 42, y: 52, w: 16, h: 46, rx: 6 },
                    { id: 'lmiddle', label: 'Middle', x: 64, y: 46, w: 16, h: 52, rx: 6 },
                    { id: 'lindex', label: 'Index', x: 86, y: 48, w: 16, h: 50, rx: 6 },
                    { id: 'thumb', label: 'Thumb', x: 110, y: 72, w: 18, h: 28, rx: 8, transform: 'rotate(20, 119, 86)' }
                ];
                const rightFingers = [
                    { id: 'rindex', label: 'Index', x: 150, y: 48, w: 16, h: 50, rx: 6 },
                    { id: 'rmiddle', label: 'Middle', x: 172, y: 46, w: 16, h: 52, rx: 6 },
                    { id: 'rring', label: 'Ring', x: 194, y: 52, w: 16, h: 46, rx: 6 },
                    { id: 'rpinky', label: 'Pinky', x: 216, y: 60, w: 16, h: 38, rx: 6 },
                    { id: 'thumb', label: 'Thumb', x: 144, y: 72, w: 18, h: 28, rx: 8, transform: 'rotate(-20, 153, 86)' }
                ];
                const isActive = (id) => id === activeFinger;
                let svg =
                    `<svg viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg"><text x="70" y="136" class="hand-label">Left Hand</text><text x="210" y="136" class="hand-label">Right Hand</text>`;
                const drawPalm = (palm, hand) => {
                    svg +=
                        `<rect x="${palm.x}" y="${palm.y}" width="${palm.w}" height="${palm.h}" rx="${palm.rx}" class="finger-shape palm ${hand}" />`;
                };
                drawPalm({ x: 20, y: 88, w: 100, h: 40, rx: 12 }, 'left');
                drawPalm({ x: 150, y: 88, w: 100, h: 40, rx: 12 }, 'right');
                const drawFinger = (f, hand) => {
                    const active = isActive(f.id);
                    const extra = f.transform || '';
                    svg +=
                        `<rect x="${f.x}" y="${f.y}" width="${f.w}" height="${f.h}" rx="${f.rx}" class="finger-shape ${f.id} ${active ? 'active' : ''}"${extra} />`;
                    const lx = f.x + f.w / 2;
                    const ly = f.y + f.h / 2 + 2;
                    const label = f.id === 'thumb' ? 'Thumb' : f.label;
                    svg +=
                        `<text x="${lx}" y="${ly}" class="finger-label ${active ? 'active' : ''}" font-size="${f.id === 'thumb' ? 6 : 7}">${label}</text>`;
                };
                leftFingers.forEach(f => drawFinger(f, 'left'));
                rightFingers.forEach(f => drawFinger(f, 'right'));
                svg += `</svg>`;
                return svg;
            }

            // ============================================================
            //  VIRTUAL KEYBOARD
            // ============================================================
            function buildKeyboardHTML() {
                const fingerLabels = {
                    'lpinky': 'Left Pinky',
                    'lring': 'Left Ring',
                    'lmiddle': 'Left Middle',
                    'lindex': 'Left Index',
                    'rindex': 'Right Index',
                    'rmiddle': 'Right Middle',
                    'rring': 'Right Ring',
                    'rpinky': 'Right Pinky',
                    'thumb': 'Thumb'
                };
                const rows = [
                    [{ label: '`', dataKey: '`', finger: 'lpinky' },
                    { label: '1', dataKey: '1', finger: 'lpinky' },
                    { label: '2', dataKey: '2', finger: 'lring' },
                    { label: '3', dataKey: '3', finger: 'lmiddle' },
                    { label: '4', dataKey: '4', finger: 'lindex' },
                    { label: '5', dataKey: '5', finger: 'lindex' },
                    { label: '6', dataKey: '6', finger: 'rindex' },
                    { label: '7', dataKey: '7', finger: 'rindex' },
                    { label: '8', dataKey: '8', finger: 'rmiddle' },
                    { label: '9', dataKey: '9', finger: 'rring' },
                    { label: '0', dataKey: '0', finger: 'rpinky' },
                    { label: '-', dataKey: '-', finger: 'rpinky' },
                    { label: '=', dataKey: '=', finger: 'rpinky' },
                    { label: '⌫', dataKey: 'backspace', finger: 'rpinky', special: true }
                    ],
                    [{ label: 'Tab', dataKey: 'tab', finger: 'lpinky', special: true },
                    { label: 'Q', dataKey: 'q', finger: 'lpinky' },
                    { label: 'W', dataKey: 'w', finger: 'lring' },
                    { label: 'E', dataKey: 'e', finger: 'lmiddle' },
                    { label: 'R', dataKey: 'r', finger: 'lindex' },
                    { label: 'T', dataKey: 't', finger: 'lindex' },
                    { label: 'Y', dataKey: 'y', finger: 'rindex' },
                    { label: 'U', dataKey: 'u', finger: 'rindex' },
                    { label: 'I', dataKey: 'i', finger: 'rmiddle' },
                    { label: 'O', dataKey: 'o', finger: 'rring' },
                    { label: 'P', dataKey: 'p', finger: 'rpinky' },
                    { label: '[', dataKey: '[', finger: 'rpinky' },
                    { label: ']', dataKey: ']', finger: 'rpinky' },
                    { label: '\\', dataKey: '\\', finger: 'rpinky' }
                    ],
                    [{ label: 'Caps', dataKey: 'capslock', finger: 'lpinky', special: true },
                    { label: 'A', dataKey: 'a', finger: 'lpinky' },
                    { label: 'S', dataKey: 's', finger: 'lring' },
                    { label: 'D', dataKey: 'd', finger: 'lmiddle' },
                    { label: 'F', dataKey: 'f', finger: 'lindex' },
                    { label: 'G', dataKey: 'g', finger: 'lindex' },
                    { label: 'H', dataKey: 'h', finger: 'rindex' },
                    { label: 'J', dataKey: 'j', finger: 'rindex' },
                    { label: 'K', dataKey: 'k', finger: 'rmiddle' },
                    { label: 'L', dataKey: 'l', finger: 'rring' },
                    { label: ';', dataKey: ';', finger: 'rpinky' },
                    { label: "'", dataKey: "'", finger: 'rpinky' },
                    { label: 'Enter', dataKey: 'enter', finger: 'rpinky', special: true }
                    ],
                    [{ label: 'Shift', dataKey: 'shift', finger: 'lpinky', special: true },
                    { label: 'Z', dataKey: 'z', finger: 'lpinky' },
                    { label: 'X', dataKey: 'x', finger: 'lring' },
                    { label: 'C', dataKey: 'c', finger: 'lmiddle' },
                    { label: 'V', dataKey: 'v', finger: 'lindex' },
                    { label: 'B', dataKey: 'b', finger: 'lindex' },
                    { label: 'N', dataKey: 'n', finger: 'rindex' },
                    { label: 'M', dataKey: 'm', finger: 'rindex' },
                    { label: ',', dataKey: ',', finger: 'rmiddle' },
                    { label: '.', dataKey: '.', finger: 'rring' },
                    { label: '/', dataKey: '/', finger: 'rpinky' },
                    { label: 'Shift', dataKey: 'shift', finger: 'rpinky', special: true }
                    ],
                    [{ label: 'Ctrl', dataKey: 'ctrl', finger: 'thumb', special: true },
                    { label: 'Alt', dataKey: 'alt', finger: 'thumb', special: true },
                    { label: 'Space', dataKey: ' ', finger: 'thumb', special: true, width: 'space' },
                    { label: 'Alt', dataKey: 'alt', finger: 'thumb', special: true },
                    { label: 'Ctrl', dataKey: 'ctrl', finger: 'thumb', special: true }
                    ]
                ];
                let html = '';
                rows.forEach(row => {
                    html += '<div class="key-row">';
                    row.forEach(key => {
                        const fingerClass = key.finger ? 'key ' + key.finger : 'key';
                        const specialClass = key.special ? ' special' : '';
                        const widthClass = key.width ? ' ' + key.width : '';
                        const fingerName = key.finger ? (fingerLabels[key.finger] || key.finger) : '';
                        html += `
                            <div class="${fingerClass}${specialClass}${widthClass}" data-key="${key.dataKey}" data-finger="${key.finger || ''}">
                                ${key.label}
                                ${fingerName ? `<span class="key-finger-tip">${fingerName}</span>` : ''}
                            </div>
                        `;
                    });
                    html += '</div>';
                });
                return html;
            }

            // ============================================================
            //  TYPING LESSON RENDERER
            // ============================================================
            function renderTypingLesson() {
                const data = LESSON_DATA[currentLessonId];
                if (!data) return;
                const phrases = data.phrases;
                const total = phrases.length;
                const shell = $('#lessonShell');

                if (currentItemIndex >= total) {
                    // Lesson complete!
                    if (!lessonCompleted) {
                        lessonCompleted = true;
                        // Save progress
                        saveProgress();
                    }
                    showCompletionScreen();
                    return;
                }

                const target = phrases[currentItemIndex];
                let dotsHtml = '<div class="lesson-progress">';
                for (let i = 0; i < total; i++) {
                    const cls = i < currentItemIndex ? 'dot done' : i === currentItemIndex ? 'dot active' : 'dot';
                    dotsHtml += `<span class="${cls}"></span>`;
                }
                dotsHtml += '</div>';

                let targetHtml = target.split('').map(ch => `<span class="char">${ch}</span>`).join('');
                const keyboardHtml = buildKeyboardHTML();
                const handSvg = buildHandSVG(null);

                shell.innerHTML = `
                    <div class="lesson-top">
                        <div>
                            <span class="tag">${data.tag || 'Typing'}</span>
                            <h2>${data.title}</h2>
                        </div>
                    </div>
                    ${dotsHtml}
                    <div class="scenario-card">
                        <div class="typing-target">${targetHtml}</div>
                        <input type="text" id="typingInput" class="typing-input" placeholder="Type the text above..." autofocus>
                        <div id="typingStatus" class="typing-status">Start typing above...</div>
                        <div class="finger-placement-area">
                            <div class="fp-title">👆 Finger Placement — use the correct finger for each key</div>
                            <div class="hand-wrapper">
                                <div class="hand-svg-wrap" id="handDiagram">${handSvg}</div>
                                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-width:100px;">
                                    <div class="finger-name-display" id="fingerNameDisplay">
                                        <span class="finger-color-dot" style="background:#b0a8a0;"></span>
                                        <span id="fingerNameText">Place fingers on home row</span>
                                    </div>
                                    <div style="font-size:0.7rem;color:#5b6b63;text-align:center;max-width:180px;">
                                        The highlighted key shows which finger to use.
                                        Hover any key to see its finger.
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="keyboard" id="virtualKeyboard">
                            ${keyboardHtml}
                            <div class="keyboard-legend">
                                <span class="legend-item"><span class="legend-color" style="background:#FF6B6B;"></span> L. Pinky</span>
                                <span class="legend-item"><span class="legend-color" style="background:#FF9F43;"></span> L. Ring</span>
                                <span class="legend-item"><span class="legend-color" style="background:#FECA57;"></span> L. Middle</span>
                                <span class="legend-item"><span class="legend-color" style="background:#54A0FF;"></span> L. Index</span>
                                <span class="legend-item"><span class="legend-color" style="background:#A29BFE;"></span> R. Index</span>
                                <span class="legend-item"><span class="legend-color" style="background:#1DD1A1;"></span> R. Middle</span>
                                <span class="legend-item"><span class="legend-color" style="background:#10AC84;"></span> R. Ring</span>
                                <span class="legend-item"><span class="legend-color" style="background:#FF9FF3;"></span> R. Pinky</span>
                                <span class="legend-item"><span class="legend-color" style="background:#b0a8a0;"></span> Thumb</span>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;flex-wrap:wrap;gap:8px;">
                        <span style="font-size:0.78rem;color:#7a7060;">${currentItemIndex+1} of ${total}</span>
                        <button class="btn btn-primary btn-sm" id="typingNext" disabled>${currentItemIndex === total-1 ? 'Finish' : 'Next'}</button>
                    </div>
                `;

                const input = $('#typingInput');
                const status = $('#typingStatus');
                const nextBtn = $('#typingNext');
                const fingerNameText = $('#fingerNameText');
                const fingerNameDisplay = $('#fingerNameDisplay');
                const handDiagram = $('#handDiagram');

                input.focus();

                const fingerNames = {
                    'lpinky': 'Left Pinky',
                    'lring': 'Left Ring',
                    'lmiddle': 'Left Middle',
                    'lindex': 'Left Index',
                    'rindex': 'Right Index',
                    'rmiddle': 'Right Middle',
                    'rring': 'Right Ring',
                    'rpinky': 'Right Pinky',
                    'thumb': 'Thumb'
                };
                const fingerColors = {
                    'lpinky': '#FF6B6B',
                    'lring': '#FF9F43',
                    'lmiddle': '#FECA57',
                    'lindex': '#54A0FF',
                    'rindex': '#A29BFE',
                    'rmiddle': '#1DD1A1',
                    'rring': '#10AC84',
                    'rpinky': '#FF9FF3',
                    'thumb': '#b0a8a0'
                };

                function getFingerForChar(ch) {
                    const map = {
                        '`': 'lpinky',
                        '1': 'lpinky',
                        'q': 'lpinky',
                        'a': 'lpinky',
                        'z': 'lpinky',
                        '2': 'lring',
                        'w': 'lring',
                        's': 'lring',
                        'x': 'lring',
                        '3': 'lmiddle',
                        'e': 'lmiddle',
                        'd': 'lmiddle',
                        'c': 'lmiddle',
                        '4': 'lindex',
                        '5': 'lindex',
                        'r': 'lindex',
                        't': 'lindex',
                        'f': 'lindex',
                        'g': 'lindex',
                        'v': 'lindex',
                        'b': 'lindex',
                        '6': 'rindex',
                        '7': 'rindex',
                        'y': 'rindex',
                        'u': 'rindex',
                        'h': 'rindex',
                        'j': 'rindex',
                        'n': 'rindex',
                        'm': 'rindex',
                        '8': 'rmiddle',
                        'i': 'rmiddle',
                        'k': 'rmiddle',
                        ',': 'rmiddle',
                        '9': 'rring',
                        'o': 'rring',
                        'l': 'rring',
                        '.': 'rring',
                        '0': 'rpinky',
                        'p': 'rpinky',
                        ';': 'rpinky',
                        "'": 'rpinky',
                        '/': 'rpinky',
                        '-': 'rpinky',
                        '=': 'rpinky',
                        '[': 'rpinky',
                        ']': 'rpinky',
                        '\\': 'rpinky',
                        ' ': 'thumb',
                        'tab': 'lpinky',
                        'capslock': 'lpinky',
                        'shift': 'lpinky',
                        'ctrl': 'thumb',
                        'alt': 'thumb',
                        'enter': 'rpinky',
                        'backspace': 'rpinky'
                    };
                    const lower = ch.toLowerCase();
                    return map[lower] || map[ch] || 'thumb';
                }

                function updateFingerDisplay(fingerId) {
                    if (fingerId && fingerNames[fingerId]) {
                        const name = fingerNames[fingerId];
                        const color = fingerColors[fingerId] || '#b0a8a0';
                        fingerNameText.textContent = name;
                        const dot = fingerNameDisplay.querySelector('.finger-color-dot');
                        if (dot) dot.style.background = color;
                        const newHandSvg = buildHandSVG(fingerId);
                        handDiagram.innerHTML = newHandSvg;
                    } else {
                        fingerNameText.textContent = 'Place fingers on home row';
                        const dot = fingerNameDisplay.querySelector('.finger-color-dot');
                        if (dot) dot.style.background = '#b0a8a0';
                        const newHandSvg = buildHandSVG(null);
                        handDiagram.innerHTML = newHandSvg;
                    }
                }

                function highlightNextKey() {
                    document.querySelectorAll('.key.highlight').forEach(el => el.classList.remove('highlight'));
                    const typed = input.value;
                    if (typed.length < target.length) {
                        const nextChar = target[typed.length];
                        const keyEl = document.querySelector(`.key[data-key="${nextChar}"]`);
                        if (keyEl) {
                            keyEl.classList.add('highlight');
                            const finger = keyEl.dataset.finger || getFingerForChar(nextChar);
                            updateFingerDisplay(finger);
                        } else {
                            const upper = nextChar.toUpperCase();
                            const keyEl2 = document.querySelector(`.key[data-key="${upper}"]`);
                            if (keyEl2) {
                                keyEl2.classList.add('highlight');
                                const finger = keyEl2.dataset.finger || getFingerForChar(nextChar);
                                updateFingerDisplay(finger);
                            } else {
                                const finger = getFingerForChar(nextChar);
                                updateFingerDisplay(finger);
                            }
                        }
                    } else {
                        updateFingerDisplay(null);
                    }
                }

                highlightNextKey();

                input.addEventListener('input', function() {
                    const typed = this.value;
                    const chars = document.querySelectorAll('.typing-target .char');
                    let allCorrect = true;
                    for (let i = 0; i < chars.length; i++) {
                        const ch = chars[i];
                        if (i < typed.length && i < target.length) {
                            if (typed[i] === target[i]) {
                                ch.className = 'char correct';
                            } else {
                                ch.className = 'char wrong';
                                allCorrect = false;
                            }
                        } else {
                            ch.className = 'char';
                            allCorrect = false;
                        }
                    }
                    if (typed.length < target.length) {
                        const currentChar = chars[typed.length];
                        if (currentChar) currentChar.className = 'char current';
                    }
                    highlightNextKey();
                    if (typed.length === target.length && allCorrect) {
                        status.textContent = '✅ Perfect! Click Next to continue.';
                        status.className = 'typing-status good';
                        nextBtn.disabled = false;
                        updateFingerDisplay(null);
                    } else {
                        if (typed.length === 0) {
                            status.textContent = 'Start typing...';
                        } else if (typed.length > target.length) {
                            status.textContent = '⚠️ Too many characters. Backspace to match the target.';
                        } else if (typed.length > 0 && !allCorrect) {
                            status.textContent = '⚠️ Some characters are wrong. Backspace and correct them.';
                        } else {
                            status.textContent = 'Keep going...';
                        }
                        status.className = 'typing-status';
                        nextBtn.disabled = true;
                    }
                });

                input.addEventListener('paste', (e) => e.preventDefault());

                document.querySelectorAll('.key').forEach(keyEl => {
                    keyEl.addEventListener('click', function() {
                        const key = this.dataset.key;
                        if (key === 'backspace') {
                            const val = input.value;
                            input.value = val.slice(0, -1);
                        } else if (key === 'space' || key === ' ') {
                            input.value += ' ';
                        } else if (key === 'enter' || key === 'tab' || key === 'capslock' || key === 'shift' ||
                            key === 'ctrl' || key === 'alt') {
                            // ignore
                        } else {
                            input.value += key;
                        }
                        input.dispatchEvent(new Event('input'));
                        input.focus();
                    });
                });

                setTimeout(() => {
                    const chars = document.querySelectorAll('.typing-target .char');
                    if (chars.length > 0) chars[0].className = 'char current';
                    highlightNextKey();
                }, 50);

                nextBtn.addEventListener('click', function() {
                    if (this.disabled) return;
                    currentItemIndex++;
                    renderTypingLesson();
                });
            }

            // ============================================================
            //  COMPLETION
            // ============================================================
            function showCompletionScreen() {
                const shell = $('#lessonShell');
                shell.innerHTML = `
                    <div class="lesson-complete">
                        <div class="big-stamp">
                            <span class="stamp-icon">⌨️</span>
                            ✓
                        </div>
                        <h2>🎯 Typing lesson complete!</h2>
                        <p style="color:#5b6b63;">You've practiced keyboard accuracy and finger placement!</p>
                        <p style="color:var(--teal-stamp);font-weight:600;margin-top:8px;">✅ Stamp saved to your Passport!</p>
                        <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;">
                            <a href="index1.html" class="btn btn-primary">Back to Home</a>
                            <button class="btn btn-secondary" id="resetLessonBtn">🔄 Start Over</button>
                        </div>
                    </div>
                `;
                document.getElementById('resetLessonBtn').addEventListener('click', function() {
                    currentItemIndex = 0;
                    lessonCompleted = false;
                    renderTypingLesson();
                });
            }

            // ============================================================
            //  CHECK IF ALREADY COMPLETED
            // ============================================================
            function checkProgress() {
                const session = getStorage('uttoron:session');
                if (session && session.num) {
                    const progress = getStorage('progress:' + session.num);
                    if (progress && progress.typing === true) {
                        // Already completed, but we'll let them practice again
                        // They can still re-do the lesson
                    }
                }
            }

            // ============================================================
            //  INIT
            // ============================================================
            function init() {
                checkProgress();
                renderTypingLesson();
            }

            init();

        })();
    </script>

</body>
</html>
